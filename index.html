<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saveur — Fine Dining Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --parchment: #ede5d4;
    --gold: #c9a84c;
    --gold-light: #e8c97e;
    --gold-dark: #9a7635;
    --charcoal: #1a1714;
    --charcoal-mid: #2d2921;
    --charcoal-light: #4a4540;
    --warm-white: #faf7f2;
    --red-accent: #8b2635;
    --green-accent: #2d5a3d;
    --text-muted: #8a7f70;
    --border: rgba(201,168,76,0.25);
    --shadow: 0 8px 40px rgba(26,23,20,0.15);
    --shadow-hover: 0 20px 60px rgba(26,23,20,0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === NAVBAR === */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--charcoal);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(10px);
  }

  .navbar-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .navbar-brand span {
    color: var(--cream);
    font-style: italic;
    font-weight: 300;
  }

  .nav-links {
    display: flex; gap: 32px; align-items: center;
    list-style: none;
  }

  .nav-links a {
    color: var(--parchment);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.75;
    transition: all 0.3s;
    cursor: pointer;
  }

  .nav-links a:hover, .nav-links a.active {
    opacity: 1;
    color: var(--gold);
  }

  .nav-cart-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    padding: 10px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .nav-cart-btn:hover { background: var(--gold-light); }

  .cart-badge {
    position: absolute;
    top: -8px; right: -8px;
    background: var(--red-accent);
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    animation: pop 0.3s ease;
  }

  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* === VIEWS === */
  .view { display: none; }
  .view.active { display: block; }

  /* === HERO === */
  .hero {
    height: 100vh;
    background: linear-gradient(160deg, var(--charcoal) 0%, var(--charcoal-mid) 50%, #2a1f10 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    padding-top: 70px;
  }

  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 70% 50%, rgba(201,168,76,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(139,38,53,0.06) 0%, transparent 60%);
  }

  .hero-content {
    text-align: center; z-index: 1; padding: 40px;
    animation: fadeUp 1s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0.9;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(56px, 8vw, 100px);
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 8px;
  }

  .hero-title em {
    color: var(--gold);
    font-style: italic;
  }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 3vw, 28px);
    color: var(--parchment);
    font-style: italic;
    font-weight: 300;
    opacity: 0.7;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }

  .hero-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

  .btn-primary {
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    padding: 16px 40px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.35);
  }

  .btn-outline {
    background: transparent;
    color: var(--cream);
    border: 1px solid rgba(245,240,232,0.3);
    padding: 16px 40px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .hero-ornament {
    width: 60px; height: 1px;
    background: var(--gold);
    margin: 40px auto 0;
    position: relative;
  }

  .hero-ornament::before, .hero-ornament::after {
    content: '◆';
    position: absolute;
    top: -6px;
    color: var(--gold);
    font-size: 8px;
  }

  .hero-ornament::before { left: -14px; }
  .hero-ornament::after { right: -14px; }

  /* === MENU PAGE === */
  .page-header {
    padding: 120px 40px 60px;
    background: var(--charcoal);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .page-header::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .page-header-label {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .page-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 300;
    color: var(--cream);
    line-height: 1.1;
  }

  .page-header h1 em {
    font-style: italic;
    color: var(--gold);
  }

  /* === FILTER BAR === */
  .filter-section {
    background: var(--charcoal-mid);
    padding: 24px 40px;
    position: sticky; top: 70px; z-index: 100;
    border-bottom: 1px solid var(--border);
  }

  .filter-row {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    max-width: 1400px; margin: 0 auto;
  }

  .filter-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--parchment);
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    white-space: nowrap;
  }

  .filter-chip:hover, .filter-chip.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--charcoal);
  }

  .filter-chip .material-icons-round { font-size: 14px; }

  .filter-search {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    padding: 8px 16px;
    flex: 0 0 240px;
  }

  .filter-search input {
    background: none; border: none; outline: none;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    width: 100%;
  }

  .filter-search input::placeholder { color: var(--text-muted); }
  .filter-search .material-icons-round { color: var(--text-muted); font-size: 18px; }

  /* === MENU GRID === */
  .menu-section {
    padding: 60px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 8px;
  }

  .section-divider {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 40px;
  }

  .section-divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .section-divider-icon {
    color: var(--gold);
    font-size: 14px;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 32px;
  }

  /* === MENU CARD === */
  .menu-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    animation: cardFadeIn 0.6s ease both;
  }

  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .menu-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-6px);
    border-color: var(--gold);
  }

  .menu-card-img {
    height: 220px;
    overflow: hidden;
    position: relative;
  }

  .menu-card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
  }

  .menu-card:hover .menu-card-img img { transform: scale(1.08); }

  .badge-group {
    position: absolute; top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 6px;
  }

  .badge {
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Jost', sans-serif;
  }

  .badge-recommended {
    background: var(--gold);
    color: var(--charcoal);
  }

  .badge-discount {
    background: var(--red-accent);
    color: white;
  }

  .badge-veg {
    background: var(--green-accent);
    color: white;
  }

  .badge-spicy {
    background: #c0392b;
    color: white;
  }

  .card-rating {
    position: absolute; top: 12px; right: 12px;
    background: rgba(26,23,20,0.85);
    color: var(--gold);
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    backdrop-filter: blur(4px);
  }

  .card-rating .material-icons-round { font-size: 12px; }

  .menu-card-body {
    padding: 24px;
  }

  .card-category {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    font-weight: 600;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 20px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .card-price {
    display: flex; flex-direction: column;
  }

  .price-current {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: var(--charcoal);
  }

  .price-original {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .card-meta {
    display: flex; gap: 12px;
    font-size: 11px;
    color: var(--text-muted);
    align-items: center;
  }

  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-meta .material-icons-round { font-size: 13px; }

  .btn-add-cart {
    background: var(--charcoal);
    color: var(--gold);
    border: 1px solid var(--charcoal);
    padding: 10px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Jost', sans-serif;
  }

  .btn-add-cart:hover {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--charcoal);
  }

  .btn-add-cart .material-icons-round { font-size: 16px; }

  /* === MENU DETAIL === */
  .detail-view {
    padding-top: 70px;
    min-height: 100vh;
    background: var(--cream);
  }

  .detail-hero {
    height: 450px;
    position: relative;
    overflow: hidden;
  }

  .detail-hero img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .detail-hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(26,23,20,0.2) 0%, rgba(26,23,20,0.85) 100%);
    display: flex; align-items: flex-end;
    padding: 48px;
  }

  .detail-hero-content h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 300;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .detail-hero-content .detail-price {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    color: var(--gold);
    font-weight: 600;
  }

  .detail-back-btn {
    position: absolute; top: 24px; left: 24px;
    background: rgba(26,23,20,0.7);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 20px;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.3s;
    backdrop-filter: blur(4px);
  }

  .detail-back-btn:hover { background: rgba(201,168,76,0.3); border-color: var(--gold); color: var(--gold); }

  .detail-body {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 60px;
  }

  .detail-tags {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }

  .detail-description {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    line-height: 1.7;
    color: var(--charcoal-light);
    font-style: italic;
    margin-bottom: 40px;
    font-weight: 300;
  }

  .detail-section-title {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
    font-weight: 600;
  }

  .ingredients-list {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 40px;
  }

  .ingredient-tag {
    padding: 6px 14px;
    background: var(--parchment);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--charcoal-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
  }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }

  .stat-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    padding: 20px;
    text-align: center;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--charcoal);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* === ORDER PANEL === */
  .order-panel {
    background: var(--charcoal);
    padding: 32px;
    border: 1px solid var(--border);
    position: sticky; top: 100px;
    height: fit-content;
  }

  .order-panel-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    color: var(--cream);
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .qty-control {
    display: flex; align-items: center; gap: 0;
    border: 1px solid var(--border);
    width: fit-content;
    margin-bottom: 20px;
  }

  .qty-btn {
    background: var(--charcoal-light);
    color: var(--cream);
    border: none;
    width: 40px; height: 40px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }

  .qty-btn:hover { background: var(--gold); color: var(--charcoal); }

  .qty-display {
    width: 48px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    background: var(--charcoal-mid);
  }

  .special-instructions {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--cream);
    padding: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    resize: none;
    outline: none;
    margin-bottom: 20px;
    min-height: 80px;
  }

  .special-instructions::placeholder { color: var(--text-muted); }

  .add-to-cart-btn {
    width: 100%;
    background: var(--gold);
    color: var(--charcoal);
    border: none;
    padding: 16px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }

  .add-to-cart-btn:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(201,168,76,0.3);
  }

  /* === CART === */
  .cart-page {
    padding-top: 70px;
    min-height: 100vh;
    background: var(--cream);
  }

  .cart-layout {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 40px;
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 40px;
    align-items: start;
  }

  .cart-items-section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 300;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
  }

  .cart-count-badge {
    background: var(--gold);
    color: var(--charcoal);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-family: 'Jost', sans-serif;
    font-weight: 700;
  }

  .cart-item {
    display: flex; gap: 20px; align-items: center;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn 0.4s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .cart-item-img {
    width: 90px; height: 70px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .cart-item-note {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 8px;
  }

  .cart-item-controls {
    display: flex; align-items: center; gap: 12px;
  }

  .mini-qty-btn {
    background: var(--parchment);
    border: 1px solid var(--border);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: var(--charcoal);
  }

  .mini-qty-btn:hover { background: var(--gold); border-color: var(--gold); }

  .mini-qty {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    min-width: 24px;
    text-align: center;
  }

  .cart-item-price {
    font-family: 'Cormorant Garamond', serif;

// =========== STATE (Angular Services equivalent) ===========
// CartService
const CartService = {
  items: [], // Array of { menuItem, quantity, specialInstructions }

  addItem(menuItem, quantity = 1, specialInstructions = '') {
    const existing = this.items.find(i => i.menuItem.id === menuItem.id);
    if (existing) {
      existing.quantity += quantity;
    } else {
      this.items.push({ menuItem, quantity, specialInstructions });
    }
    this._notifyChange();
  },

  removeItem(id) {
    this.items = this.items.filter(i => i.menuItem.id !== id);
    this._notifyChange();
  },

  updateQty(id, qty) {
    const item = this.items.find(i => i.menuItem.id === id);
    if (item) {
      item.quantity = qty;
      if (item.quantity <= 0) this.removeItem(id);
    }
    this._notifyChange();
  },

  getEffectivePrice(item) {
    if (item.isDiscounted && item.discountPercent > 0) {
      return item.price * (1 - item.discountPercent / 100);
    }
    return item.price;
  },

  getSubtotal() {
    return this.items.reduce((sum, i) => sum + this.getEffectivePrice(i.menuItem) * i.quantity, 0);
  },

  getTax() { return this.getSubtotal() * 0.08; },
  getDeliveryFee() { return this.items.length > 0 ? 5.99 : 0; },
  getTotal() { return this.getSubtotal() + this.getTax() + this.getDeliveryFee(); },
  getCount() { return this.items.reduce((sum, i) => sum + i.quantity, 0); },

  clear() { this.items = []; this._notifyChange(); },

  _notifyChange() {
    const count = this.getCount();
    const badge = document.getElementById('cart-badge');
    if (count > 0) {
      badge.style.display = 'flex';
      badge.textContent = count;
    } else {
      badge.style.display = 'none';
    }
    // Re-render cart if visible
    if (currentView === 'cart') renderCart();
  }
};

// MenuService
const MenuService = {
  getAll() { return menuData.menuItems; },
  getById(id) { return menuData.menuItems.find(i => i.id === id); },
  getCategories() { return menuData.categories; },
  getByCategory(catId) {
    if (!catId) return menuData.menuItems;
    return menuData.menuItems.filter(i => i.categoryId === catId);
  },
  filterBySearch(items, query) {
    if (!query) return items;
    const q = query.toLowerCase();
    return items.filter(i =>
      i.name.toLowerCase().includes(q) ||
      i.description.toLowerCase().includes(q) ||
      i.ingredients.some(ing => ing.toLowerCase().includes(q))
    );
  }
};

// =========== ROUTING (Angular Router equivalent) ===========
let currentView = 'home';
let currentCategoryFilter = 0;
let searchQuery = '';

function navigate(view, param = null) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');

  // Update nav active states
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + (view === 'detail' ? 'menu' : view));
  if (navEl) navEl.classList.add('active');

  currentView = view;
  window.scrollTo(0, 0);

  // Route guard: can't checkout with empty cart
  if (view === 'checkout' && CartService.getCount() === 0) {
    showSnackbar('Please add items to your cart first', 'warning');
    navigate('cart');
    return;
  }

  if (view === 'menu') renderMenu();
  else if (view === 'detail' && param) renderDetail(param);
  else if (view === 'cart') renderCart();
  else if (view === 'checkout') renderCheckout();
}

// =========== PIPES (Angular Pipe equivalent) ===========
// CurrencyPipe
function formatCurrency(val) {
  return '$' + val.toFixed(2);
}

// MenuFilterPipe
function applyFilters(items, catId, query) {
  let filtered = catId ? MenuService.getByCategory(catId) : items;
  return MenuService.filterBySearch(filtered, query);
}

// RatingPipe
function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  let stars = '';
  for (let i = 0; i < full; i++) stars += '★';
  if (half) stars += '½';
  return stars;
}

// =========== DIRECTIVES (Angular Directive equivalent) ===========
// HighlightRecommended: adds gold border to recommended cards
function getCardHighlightClass(item) {
  if (item.isRecommended) return 'style="border-color: var(--gold);"';
  return '';
}

// DiscountDirective: applies discount styling
function getDiscountedPrice(item) {
  if (item.isDiscounted && item.discountPercent > 0) {
    return item.price * (1 - item.discountPercent / 100);
  }
  return item.price;
}

      <div class="summary-line"><span>Tax (8%)</span><span>${formatCurrency(CartService.getTax())}</span></div>
      <div class="summary-line"><span>Delivery</span><span>${formatCurrency(CartService.getDeliveryFee())}</span></div>
      <div class="summary-line total">
        <span>Total</span>
        <span class="summary-total-amount">${formatCurrency(total)}</span>
      </div>
      <button class="btn-outline" onclick="navigate('cart')" style="width:100%;margin-top:16px;justify-content:center;display:flex;padding:12px;font-size:12px;">
        ← Edit Cart
      </button>
    </div>`;

  document.getElementById('checkout-content').innerHTML = html;
}

function selectPayment(method) {
  selectedPayment = method;
  document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
  document.getElementById('pay-' + method).classList.add('selected');
  const showCard = method === 'CREDIT_CARD' || method === 'DEBIT_CARD';
  document.getElementById('card-fields').style.display = showCard ? 'grid' : 'none';
  document.getElementById('card-fields-2').style.display = showCard ? 'grid' : 'none';
}

function formatCard(input) {
  let val = input.value.replace(/\D/g, '');
  val = val.match(/.{1,4}/g)?.join(' ') || val;
  input.value = val;
}

function formatExpiry(input) {
  let val = input.value.replace(/\D/g, '');
  if (val.length >= 2) val = val.slice(0,2) + ' / ' + val.slice(2);
  input.value = val;
}

// Validation (Angular Validators equivalent)
function validateField(field, value) {
  const validators = {
    firstName: v => v.trim().length >= 2,
    lastName: v => v.trim().length >= 2,
    email: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
    phone: v => v.trim().length >= 7,
    street: v => v.trim().length >= 5,
    city: v => v.trim().length >= 2,
    state: v => v.trim().length >= 2,
    zip: v => v.trim().length >= 3
  };
  const valid = validators[field] ? validators[field](value) : true;
  const input = document.getElementById('f-' + field);
  const errEl = document.getElementById('err-' + field);
  if (input) input.classList.toggle('error', !valid && value.length > 0);
  if (errEl) errEl.classList.toggle('visible', !valid && value.length > 0);
  return valid;
}

function validateForm() {
  const fields = ['firstName', 'lastName', 'email', 'phone', 'street', 'city', 'state', 'zip'];
  let valid = true;
  fields.forEach(f => {
    const input = document.getElementById('f-' + f);
    if (input && !validateField(f, input.value)) {
      const errEl = document.getElementById('err-' + f);
      if (input) input.classList.add('error');
      if (errEl) errEl.classList.add('visible');
      valid = false;
    }
  });
  return valid;
}

function placeOrder() {
  if (!validateForm()) {
    showSnackbar('Please fill in all required fields', 'error');
    document.querySelector('.form-input.error')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Build order object
  const order = {
    id: 'ORD-' + Date.now().toString(36).toUpperCase(),
    customer: {
      firstName: document.getElementById('f-firstName').value,
      lastName: document.getElementById('f-lastName').value,
      email: document.getElementById('f-email').value,
      phone: document.getElementById('f-phone').value,
      address: {
        street: document.getElementById('f-street').value,
        city: document.getElementById('f-city').value,
        state: document.getElementById('f-state').value,
        zipCode: document.getElementById('f-zip').value
      }
    },
    items: [...CartService.items],
    subtotal: CartService.getSubtotal(),
    tax: CartService.getTax(),
    deliveryFee: CartService.getDeliveryFee(),
    total: CartService.getTotal(),
    paymentMethod: selectedPayment,
    status: 'CONFIRMED',
    createdAt: new Date(),
    specialNotes: document.getElementById('f-notes')?.value || ''
  };

  window._lastOrder = order;
  renderConfirmation(order);
  CartService.clear();
  navigate('confirmation');
}

// =========== SNACKBAR (MatSnackBar equivalent) ===========
function showSnackbar(msg, type = 'success') {
  const sb = document.getElementById('snackbar');
  const msgEl = document.getElementById('snackbar-msg');
  msgEl.textContent = msg;
  sb.style.borderLeftColor = type === 'error' ? 'var(--red-accent)' : type === 'warning' ? '#f39c12' : 'var(--gold)';
  sb.classList.add('show');
  clearTimeout(window._sbTimer);
  window._sbTimer = setTimeout(() => sb.classList.remove('show'), 3500);
}

  renderCategoryFilters();
});
